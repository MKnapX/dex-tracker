<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon HOME Dex Tracker</title>
<link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
<meta name="apple-mobile-web-app-title" content="HOME Dex">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root {
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
  --card:#1e2a4a;--card2:#253560;
  --text:#e0e0e0;--text2:#a0aec0;
  --accent:#e94560;--caught:#4ade80;--uncaught:#2d3748;
  --border:#2d3748;--shadow:rgba(0,0,0,.4);
}
.light {
  --bg:#f0f4f8;--bg2:#e2e8f0;--bg3:#cbd5e0;
  --card:#fff;--card2:#f7fafc;
  --text:#1a202c;--text2:#4a5568;
  --uncaught:#e2e8f0;--border:#cbd5e0;--shadow:rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:2px solid var(--accent);padding:0 16px;box-shadow:0 2px 12px var(--shadow)}
.hdr-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 0}
.logo{font-size:1.2rem;font-weight:800;color:var(--accent);white-space:nowrap}
.logo span{color:var(--text)}
nav{display:flex;gap:4px;flex-wrap:wrap}
.nb{padding:7px 15px;border:none;border-radius:20px;cursor:pointer;font-weight:600;font-size:.82rem;background:transparent;color:var(--text2);transition:all .2s}
.nb.on,.nb:hover{background:var(--accent);color:#fff}
.hdr-r{display:flex;gap:8px;align-items:center;margin-left:auto}
.dtog{background:var(--bg3);border:none;border-radius:20px;padding:6px 13px;color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600}
/* ── SEARCH BAR ── */
#sbar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}
.sbar-i{max-width:1400px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#sinp{flex:1;min-width:140px;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.88rem}
.fsel{padding:7px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.82rem;cursor:pointer}
.fbtn{padding:7px 13px;border-radius:20px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;background:var(--card2);color:var(--text2);transition:all .2s}
.fbtn.on{background:var(--accent);color:#fff}
/* ── SECTIONS ── */
.sec{display:none;max-width:1400px;margin:0 auto;padding:16px}
.sec.on{display:block}
/* ── COMPLETION HEADER ── */
.cbar{background:var(--card);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.cpct{font-size:2rem;font-weight:800;color:var(--accent)}
.clbl{font-size:.85rem;color:var(--text2)}
.pbar{flex:1;min-width:120px;height:10px;background:var(--uncaught);border-radius:5px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--caught),#22c55e);border-radius:5px;transition:width .4s}
.cnum{font-size:.85rem;color:var(--text2)}
/* ── BOXES ── */
.bwrap{margin-bottom:22px}
.bhdr{display:flex;align-items:center;gap:10px;margin-bottom:7px;background:var(--card);border-radius:10px;padding:8px 14px;border-left:4px solid var(--accent)}
.btitle{font-weight:800;font-size:1rem;color:var(--text);letter-spacing:.04em;text-transform:uppercase}
.bcnt{font-size:.78rem;font-weight:700;color:var(--accent);background:var(--bg2);padding:3px 10px;border-radius:10px;vertical-align:middle}
.bgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;background:var(--card);border-radius:12px;padding:10px;border:1px solid var(--border)}
/* ── SLOT ── */
.slot{position:relative;aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--uncaught);border:2px solid transparent;transition:border-color .15s,transform .15s;-webkit-tap-highlight-color:transparent;user-select:none}
@media(hover:hover){.slot:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent)44;z-index:2}}
.slot.got{background:var(--card2);border-color:var(--caught)}
.slot img{width:74%;height:74%;object-fit:contain;image-rendering:pixelated;filter:brightness(.28) grayscale(1);transition:filter .2s;pointer-events:none}
.slot.got img{filter:none}
.snum{font-size:.58rem;font-weight:700;color:var(--text2);line-height:1;margin-top:1px;pointer-events:none}
.sname{font-size:.48rem;color:var(--text2);text-align:center;line-height:1;margin-top:1px;pointer-events:none}
.slot.got .snum,.slot.got .sname{color:var(--caught)}
.slot.hold{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent)66;}
/* ── FORMS ── */
.fcat{margin-bottom:20px}
.fcattitle{font-size:.95rem;font-weight:700;padding:8px 12px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.badge{font-size:.68rem;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px}
/* ── DASHBOARD ── */
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px;margin-bottom:20px}
.dcard{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border)}
.dcard h3{font-size:.88rem;color:var(--text2);margin-bottom:12px;font-weight:600}
.grow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.glbl{font-size:.78rem;flex:1}
.gpct{font-size:.78rem;font-weight:700;min-width:36px;text-align:right}
.gbar{flex:2;height:6px;background:var(--uncaught);border-radius:3px;overflow:hidden}
.gbfill{height:100%;border-radius:3px;transition:width .4s}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.gchip{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;border:2px solid var(--border);cursor:pointer;transition:all .2s;font-size:.78rem;font-weight:600;background:var(--card2)}
.gchip.own{border-color:var(--caught);background:rgba(74,222,128,.1)}
.gchip .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.gchip.own .dot{background:var(--caught)}
/* ── TOOLTIP ── */
.tip{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.78rem;z-index:200;pointer-events:none;box-shadow:0 4px 20px var(--shadow);max-width:190px;display:none}
.tname{font-weight:700;font-size:.92rem;margin-bottom:3px}
.tnum{color:var(--text2);font-size:.72rem;margin-bottom:5px}
.tstat{padding:3px 10px;border-radius:10px;font-size:.72rem;font-weight:700;display:inline-block}
.tstat.got{background:rgba(74,222,128,.2);color:var(--caught)}
.tstat.mis{background:rgba(233,69,96,.2);color:var(--accent)}
/* ── CONFETTI ── */
#cc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
/* ── SEARCH HIGHLIGHT ── */
.box-highlight{box-shadow:0 0 0 3px var(--accent),0 4px 24px var(--shadow);border-radius:14px}
.box-highlight .bgrid{border-color:var(--accent)}
.box-highlight .btitle{color:var(--accent)}
/* ── MOBILE ── */
@media(max-width:520px){
  .bgrid{gap:3px;padding:6px}
  .snum{font-size:.5rem}
  .hdr-inner{gap:7px}
}
</style>
</head>
<body>

<canvas id="cc"></canvas>
<div class="tip" id="tip">
  <div class="tname" id="tname"></div>
  <div class="tnum" id="tnum"></div>
  <div class="tstat" id="tstat"></div>
</div>

<header id="hdr">
  <div class="hdr-inner">
    <div class="logo">HOME <span>Dex</span></div>
    <nav>
      <button class="nb on" onclick="showSec('dex',this)">📦 Main Dex</button>
      <button class="nb" onclick="showSec('forms',this)">✨ Forms</button>
      <button class="nb" onclick="showSec('dash',this)">📊 Dashboard</button>
    </nav>
    <div class="hdr-r">
      <button class="dtog" id="dtog" onclick="toggleDark()">☀️ Light</button>
    </div>
  </div>
</header>

<div id="sbar">
  <div class="sbar-i">
    <input type="text" id="sinp" placeholder="Search name or #…" oninput="applyFilters()">
    <select class="fsel" id="gfil" onchange="applyFilters()">
      <option value="0">All Gens</option>
      <option value="1">Gen 1 (1–151)</option>
      <option value="2">Gen 2 (152–251)</option>
      <option value="3">Gen 3 (252–386)</option>
      <option value="4">Gen 4 (387–493)</option>
      <option value="5">Gen 5 (494–649)</option>
      <option value="6">Gen 6 (650–721)</option>
      <option value="7">Gen 7 (722–809)</option>
      <option value="8">Gen 8 (810–905)</option>
      <option value="9">Gen 9 (906–1025)</option>
    </select>
    <button class="fbtn on" id="fa" onclick="setStat('all')">All</button>
    <button class="fbtn" id="fc" onclick="setStat('caught')">✅ Caught</button>
    <button class="fbtn" id="fm" onclick="setStat('missing')">❌ Missing</button>
  </div>
</div>

<div id="sec-dex" class="sec on">
  <div class="cbar">
    <div><div class="cpct" id="mpct">0%</div><div class="clbl">Main Dex Complete (#1–1025)</div></div>
    <div class="pbar"><div class="pfill" id="mbar" style="width:0%"></div></div>
    <div class="cnum" id="mcnt">0 / 1025</div>
  </div>
  <div id="dex-boxes"></div>
</div>

<div id="sec-forms" class="sec">
  <div class="cbar">
    <div><div class="cpct" id="fpct">0%</div><div class="clbl">Forms Complete</div></div>
    <div class="pbar"><div class="pfill" id="fbar" style="width:0%"></div></div>
    <div class="cnum" id="fcnt">0 / 0</div>
  </div>
  <div id="forms-boxes"></div>
</div>

<div id="sec-dash" class="sec">

    <div class="dcard"><h3>📈 Generation Completion</h3><div id="gstats"></div></div>

  </div>
</div>

function save(){
  try{
    localStorage.setItem('pht_caught', JSON.stringify(caught));
    localStorage.setItem('pht_forms',  JSON.stringify(formsCaught));
    localStorage.setItem('pht_games',  JSON.stringify(ownedGames));
    localStorage.setItem('pht_dark',   dark?'1':'0');
  }catch(e){}
  cloudSave();
}
function load(){
  try{
    caught       = JSON.parse(localStorage.getItem('pht_caught')||'{}');
    formsCaught  = JSON.parse(localStorage.getItem('pht_forms') ||'{}');
    ownedGames   = JSON.parse(localStorage.getItem('pht_games') ||'{}');
    const d = localStorage.getItem('pht_dark');
    dark = d===null ? true : d==='1';
  }catch(e){}
}

const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/';
const FALLBACK_SVG = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='60' r='54' fill='%23374151' stroke='%234b5563' stroke-width='4'/%3E%3Cpath d='M6 60h108M34 60a26 26 0 0 1 52 0' fill='none' stroke='%236b7280' stroke-width='6'/%3E%3Ccircle cx='60' cy='60' r='14' fill='%234b5563' stroke='%236b7280' stroke-width='4'/%3E%3Ccircle cx='60' cy='60' r='6' fill='%239ca3af'/%3E%3C/svg%3E`;
const spr = id => `${SPRITE_BASE}${id}.png`;
const getGen = n => GENS.find(g=>n>=g.s&&n<=g.e)||GENS[0];
const pad = n => String(n).padStart(4,'0');

function showSec(id, btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='dash') renderDash();
}

function toggleDark(){
  dark=!dark;
  document.body.classList.toggle('light',!dark);
  document.getElementById('dtog').textContent = dark?'☀️ Light':'🌙 Dark';
  save();
}

function setStat(s){
  statFil=s;
  ['all','caught','missing'].forEach(x=>document.getElementById('f'+x[0]).classList.toggle('on',x===s));
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('sinp').value.toLowerCase().trim();
  const gf = +document.getElementById('gfil').value;

  // collect which box wrappers have a match
  const matchedBoxes = new Set();

  document.querySelectorAll('.slot[data-id]').forEach(el=>{
    const id=+el.dataset.id, nm=(N[id]||'').toLowerCase(), gen=getGen(id);
    let show=true;
    if(q && !nm.includes(q) && !String(id).includes(q)) show=false;
    if(gf && gen.n!==gf) show=false;
    if(statFil==='caught' && !caught[id]) show=false;
    if(statFil==='missing' && caught[id]) show=false;

    // when searching, always show all slots inside matched boxes —
    // just flag which boxes contain a hit
    if(q && (nm.includes(q) || String(id).includes(q))) {
      const box = el.closest('.bwrap');
      if(box) matchedBoxes.add(box);
    }

    // hide/show individual slots only when NOT doing a name/id search
    if(!q) el.style.display = show ? '' : 'none';
    else    el.style.display = '';
  });

  // show/hide/highlight entire boxes based on search
  document.querySelectorAll('.bwrap').forEach(box=>{
    if(!q){
      box.style.display = '';
      box.classList.remove('box-highlight');
    } else {
      const hit = matchedBoxes.has(box);
      box.style.display = hit ? '' : 'none';
      box.classList.toggle('box-highlight', hit);
    }
  });
}

const tip=document.getElementById('tip');
let tipTO=null;
function showTip(e,id,nm,isC){
  document.getElementById('tname').textContent=nm;
  document.getElementById('tnum').textContent='#'+pad(isC?id:0)+(typeof id==='number'?'':'');
  // For forms, skip the dex number display
  if(typeof id==='string'){ document.getElementById('tnum').textContent=nm; }
  else { document.getElementById('tnum').textContent='#'+pad(id); }
  const s=document.getElementById('tstat');
  s.textContent=isC?'✅ Caught':'❌ Missing';
  s.className='tstat '+(isC?'got':'mis');
  tip.style.display='block';
  moveTip(e);
  clearTimeout(tipTO);
  tipTO=setTimeout(()=>tip.style.display='none',2000);
}
function moveTip(e){
  const cx=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0);
  const cy=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);
  tip.style.left=Math.min(cx+14,window.innerWidth-200)+'px';
  tip.style.top=Math.max(cy-10,8)+'px';
}
document.addEventListener('mousemove',moveTip);
document.addEventListener('scroll',()=>tip.style.display='none');

function toggleCatch(id, isF){
  if(isF){ formsCaught[id]=!formsCaught[id]; if(!formsCaught[id]) delete formsCaught[id]; }
  else   { caught[id]=!caught[id];            if(!caught[id])      delete caught[id]; }
  save();
  const sel=isF?`[data-fid="${id}"]`:`[data-id="${id}"]`;
  const el=document.querySelector(sel);
  if(el) el.classList.toggle('got', isF?!!formsCaught[id]:!!caught[id]);
  updateBars();
  checkConfetti();
}

function mkSlot(id, nm, sprId, isF){
  const el=document.createElement('div');
  el.className='slot'+((!isF&&caught[id])||(isF&&formsCaught[id])?' got':'');
  if(isF) el.dataset.fid=id; else el.dataset.id=id;

  const img=document.createElement('img');
  img.src=spr(sprId); img.loading='lazy'; img.alt=nm;
  img.onerror=()=>{
    // fallback 1: pokemondb
    if(!img.dataset.fb1){
      img.dataset.fb1='1';
      // only works for numbered ids
      const numId=parseInt(sprId);
      if(!isNaN(numId) && numId<=1025){
        img.src=`https://img.pokemondb.net/sprites/home/normal/${(nm||'unknown').toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')}.png`;
        return;
      }
    }
    img.src=FALLBACK_SVG;
  };

  const snum=document.createElement('div'); snum.className='snum';
  snum.textContent=isF?'':('#'+pad(id));
  const snm=document.createElement('div'); snm.className='sname';
  snm.textContent=nm;
  el.append(img,snum,snm);

  // ── interaction: hold = toggle, tap = tooltip, dblclick = toggle ──
  let held=false;
  const onDown=e=>{
    held=false;
    holdT=setTimeout(()=>{
      held=true;
      el.classList.add('hold');
      if(navigator.vibrate) navigator.vibrate(25);
      toggleCatch(id,isF);
      el.classList.remove('hold');
    },380);
  };
  const onUp=e=>{
    clearTimeout(holdT);
    el.classList.remove('hold');
    if(!held){
      const isC=isF?!!formsCaught[id]:!!caught[id];
      showTip(e,id,nm,isC);
    }
  };
  el.addEventListener('mousedown',onDown);
  el.addEventListener('mouseup',onUp);
  el.addEventListener('mouseleave',()=>{clearTimeout(holdT);el.classList.remove('hold');});
  el.addEventListener('touchstart',e=>{e.preventDefault();onDown(e.touches[0]);},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();onUp(e.changedTouches[0]);},{passive:false});
  el.addEventListener('touchcancel',()=>{clearTimeout(holdT);el.classList.remove('hold');});
  el.addEventListener('dblclick',()=>toggleCatch(id,isF));
  return el;
}

// ═══════════════════════════════════════════
//  BUILD DEX BOXES
// ═══════════════════════════════════════════
function buildDex(){
  const wrap=document.getElementById('dex-boxes');
  wrap.innerHTML='';
  const BOX=30, TOTAL=1025;
  for(let b=0;b<Math.ceil(TOTAL/BOX);b++){
    const s=b*BOX+1, e=Math.min(s+BOX-1,TOTAL);
    const bw=document.createElement('div'); bw.className='bwrap';
    bw.innerHTML=`<div class="bhdr"><span class="btitle">Box ${b+1} <span class="bcnt">#${s}–#${e}</span></span></div>`;
    const grid=document.createElement('div'); grid.className='bgrid';
    for(let id=s;id<=e;id++){
      grid.appendChild(mkSlot(id,N[id]||`#${id}`,String(id),false));
    }
    bw.appendChild(grid);
    wrap.appendChild(bw);
  }
}

// ═══════════════════════════════════════════
//  BUILD FORMS BOXES
// ═══════════════════════════════════════════
function buildForms(){
  const wrap=document.getElementById('forms-boxes');
  wrap.innerHTML='';
  FORMS.forEach(cat=>{
    const sec=document.createElement('div'); sec.className='fcat';
    const cc=cat.list.filter(f=>formsCaught[f.id]).length;
    const title=document.createElement('div');
    title.className='fcattitle';
    title.id='fcat-'+cat.cat.replace(/\s/g,'_');
    title.style.cssText=`background:${cat.col}22;color:${cat.col};border:1px solid ${cat.col}44`;
    title.innerHTML=`${cat.cat} <span class="badge">${cc}/${cat.list.length}</span>`;
    const grid=document.createElement('div'); grid.className='bgrid';
    cat.list.forEach(f=>grid.appendChild(mkSlot(f.id,f.nm,f.sp,true)));
    sec.append(title,grid);
    wrap.appendChild(sec);
  });
}

// ═══════════════════════════════════════════
//  COMPLETION BARS
// ═══════════════════════════════════════════
function updateBars(){
  const c=Object.keys(caught).filter(k=>+k>=1&&+k<=1025).length;
  const pct=(c/1025*100).toFixed(1);
  document.getElementById('mpct').textContent=pct+'%';
  document.getElementById('mbar').style.width=pct+'%';
  document.getElementById('mcnt').textContent=`${c} / 1025`;

  const ft=FORMS.reduce((a,x)=>a+x.list.length,0);
  const fc=Object.keys(formsCaught).length;
  const fp=ft?(fc/ft*100).toFixed(1):'0.0';
  document.getElementById('fpct').textContent=fp+'%';
  document.getElementById('fbar').style.width=fp+'%';
  document.getElementById('fcnt').textContent=`${fc} / ${ft}`;

  FORMS.forEach(cat=>{
    const el=document.getElementById('fcat-'+cat.cat.replace(/\s/g,'_'));
    if(el){
      const cc=cat.list.filter(f=>formsCaught[f.id]).length;
      const b=el.querySelector('.badge');
      if(b) b.textContent=`${cc}/${cat.list.length}`;
    }
  });
}

// ═══════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════
function renderDash(){
  // gen stats
  const gs=document.getElementById('gstats'); gs.innerHTML='';
  GENS.forEach(g=>{
    const tot=g.e-g.s+1;
    const c=Object.keys(caught).filter(k=>+k>=g.s&&+k<=g.e).length;
    const p=(c/tot*100).toFixed(0);
    gs.innerHTML+=`<div class="grow">
      <div class="gdot" style="background:${g.c}"></div>
      <div class="glbl">Gen ${g.n} <span style="color:var(--text2)">(${g.s}–${g.e})</span></div>
      <div class="gbar"><div class="gbfill" style="width:${p}%;background:${g.c}"></div></div>
      <div class="gpct" style="color:${g.c}">${p}%</div>
    </div>`;
  });

  // games
  const gg=document.getElementById('ggrid'); gg.innerHTML='';
  GAMES.forEach(g=>{
    const chip=document.createElement('div');
    chip.className='gchip'+(ownedGames[g.id]?' own':'');
    chip.innerHTML=`<div class="dot"></div>${g.ic} ${g.nm}`;
    chip.onclick=()=>{
      ownedGames[g.id]=!ownedGames[g.id];
      chip.classList.toggle('own',ownedGames[g.id]);
      save(); renderObt();
    };
    gg.appendChild(chip);
  });
  renderObt();
}

function renderObt(){
  const owned=GAMES.filter(g=>ownedGames[g.id]).map(g=>g.nm);
  const div=document.getElementById('obtnotes');
  if(!owned.length){div.textContent='Select the games you own above to see notes.';return;}
  const notes={
    Scarlet:'Koraidon, Armarouge, Great Tusk, Scream Tail, Brute Bonnet, Flutter Mane, Slither Wing, Sandy Shocks, Roaring Moon, Gouging Fire, Raging Bolt',
    Violet:'Miraidon, Ceruledge, Iron Treads, Iron Bundle, Iron Hands, Iron Jugulis, Iron Moth, Iron Thorns, Iron Valiant, Walking Wake, Iron Leaves, Iron Boulder, Iron Crown',
    Sword:'Zacian, Bagon line, Deino line, Jangmo-o line, Farfetch\'d-Galar, Sirfetch\'d, Flapple',
    Shield:'Zamazenta, Larvitar line, Corsola-Galar, Cursola, Appletun',
    BDSP:'Dialga (BD) / Palkia (SP), most Gen 1–4 Pokémon via Grand Underground',
    PLA:'All Hisuian forms, Wyrdeer, Kleavor, Basculegion, Sneasler, Overqwil, Enamorus, Ursaluna',
    Sun:'Solgaleo, all Alolan forms natively',
    Moon:'Lunala, all Alolan forms natively',
    ORAS:'Latias/Latios, Mega Rayquaza, Deoxys, most Gen 3 Pokémon',
    HOME:'Required to transfer between games. Some events distributed here.',
  };
  div.innerHTML=owned.map(g=>notes[g]?`<b>${g}:</b> ${notes[g]}<br>`:'').join('');
}

// ═══════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════
function checkConfetti(){
  if(Object.keys(caught).filter(k=>+k>=1&&+k<=1025).length===1025) launchConfetti();
}
function launchConfetti(){
  const cv=document.getElementById('cc'), ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight;
  const ps=Array.from({length:160},()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*cv.height,
    w:5+Math.random()*7, h:10+Math.random()*7,
    r:Math.random()*Math.PI*2, dr:(.5-Math.random())*.18,
    vx:(.5-Math.random())*2, vy:2.5+Math.random()*3,
    col:`hsl(${Math.random()*360},90%,60%)`
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.dr;
      if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}
    });
    if(f++<360) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
load();
document.body.classList.toggle('light',!dark);
document.getElementById('dtog').textContent=dark?'☀️ Light':'🌙 Dark';
buildDex();
buildForms();
updateBars();
</script>

  const syncDot = document.createElement('span');
  syncDot.id = 'sync-dot';
  syncDot.title = 'Cloud sync status';
  syncDot.style.cssText =
    'width:8px;height:8px;border-radius:50%;background:#f39c12;display:inline-block;margin-left:4px;transition:background .4s;flex-shrink:0';
  document.querySelector('.hdr-r').prepend(syncDot);

  const setSyncStatus = s => {
    // s: 'syncing' | 'ok' | 'error'
    syncDot.style.background = s==='ok' ? '#4ade80' : s==='error' ? '#e94560' : '#f39c12';
    syncDot.title = s==='ok' ? 'Synced to cloud' : s==='error' ? 'Sync error' : 'Syncing…';
  };

  let uid = null;
  let saveTimer = null;

  // Debounced cloud save — batches rapid catches into one write
  window.cloudSave = () => {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      if (!uid) return;
      setSyncStatus('syncing');
      try {
        await setDoc(
          doc(db, 'users', uid, 'data', 'progress'),
          {
            caught:      JSON.stringify(caught),
            formsCaught: JSON.stringify(formsCaught),
            ownedGames:  JSON.stringify(ownedGames),
            dark:        dark ? '1' : '0',
            updatedAt:   Date.now(),
          }
        );
        setSyncStatus('ok');
      } catch(e) {
        console.error('[HOME Dex] Firestore save error:', e);
        setSyncStatus('error');
      }
    }, 800); // wait 800 ms after last catch before writing
  };

  // Apply loaded cloud data to the live UI
  function applyCloudData(d) {
    try { caught      = JSON.parse(d.caught      || '{}'); } catch(e){}
    try { formsCaught = JSON.parse(d.formsCaught || '{}'); } catch(e){}
    try { ownedGames  = JSON.parse(d.ownedGames  || '{}'); } catch(e){}
    dark = d.dark !== '0';

    document.body.classList.toggle('light', !dark);
    document.getElementById('dtog').textContent = dark ? '☀️ Light' : '🌙 Dark';

    // sync slot classes
    document.querySelectorAll('.slot[data-id]').forEach(el => {
      el.classList.toggle('got', !!caught[+el.dataset.id]);
    });
    document.querySelectorAll('.slot[data-fid]').forEach(el => {
      el.classList.toggle('got', !!formsCaught[el.dataset.fid]);
    });
    updateBars();

    // mirror to localStorage
    try {
      localStorage.setItem('pht_caught', JSON.stringify(caught));
      localStorage.setItem('pht_forms',  JSON.stringify(formsCaught));
      localStorage.setItem('pht_games',  JSON.stringify(ownedGames));
      localStorage.setItem('pht_dark',   dark ? '1' : '0');
    } catch(e){}
  }

  signInAnonymously(auth).catch(e => {
    console.error('[HOME Dex] Auth error:', e);
    setSyncStatus('error');
  });

  onAuthStateChanged(auth, async user => {
    if (!user) return;
    uid = user.uid;
    setSyncStatus('syncing');

    try {
      const snap = await getDoc(doc(db, 'users', uid, 'data', 'progress'));
      if (snap.exists()) {
        // Cloud has data — check which is newer
        const cloud = snap.data();
        const cloudTs = cloud.updatedAt || 0;
        const localTs = +localStorage.getItem('pht_ts') || 0;
        if (cloudTs >= localTs) {
          applyCloudData(cloud);
        }
        // else keep the localStorage data that was already loaded
      }
      setSyncStatus('ok');
    } catch(e) {
      console.error('[HOME Dex] Firestore load error:', e);
      setSyncStatus('error');
    }
  });

  // stamp localStorage writes so we can compare with cloud
  const _origSave = window.save;
  window.save = () => {
    try { localStorage.setItem('pht_ts', Date.now()); } catch(e){}
    _origSave();
  };
}
